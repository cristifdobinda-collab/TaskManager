{% extends "layouts/base.html" %}
{% block title %}Login - Task Manager{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Sign In</h1>
        <p class="auth-subtitle">Welcome back to Task Manager</p>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password">
            </div>
            <div class="form-row">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember"> Remember me
                </label>
                <a href="{{ url_for('auth.reset_password') }}" class="link-sm">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a></p>
    </div>
</div>
{% endblock %}
