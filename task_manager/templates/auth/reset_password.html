{% extends "layouts/base.html" %}
{% block title %}Reset Password - Task Manager{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Reset Password</h1>
        <p class="auth-subtitle">Enter your email to receive a reset link</p>
        <form method="POST" action="{{ url_for('auth.reset_password') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Send Reset Link</button>
        </form>
        <p class="auth-footer"><a href="{{ url_for('auth.login') }}">Back to login</a></p>
    </div>
</div>
{% endblock %}
