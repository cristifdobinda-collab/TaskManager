{% extends "layouts/base.html" %}
{% block title %}Create Team - Task Manager{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Create Team</h1>
</div>

<form method="POST" action="{{ url_for('teams.create') }}" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label for="name">Team Name *</label>
        <input type="text" id="name" name="name" required placeholder="e.g. Engineering, Marketing" autofocus>
    </div>

    <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="3" placeholder="What does this team do?"></textarea>
    </div>

    <div class="form-row-2">
        <div class="form-group">
            <label for="lead_id">Team Lead</label>
            <select id="lead_id" name="lead_id">
                <option value="">No lead</option>
                {% for user in users %}
                <option value="{{ user.id }}">{{ user.display_name }} ({{ user.username }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="color">Color</label>
            <input type="color" id="color" name="color" value="#2563eb" class="color-input">
        </div>
    </div>

    <div class="form-group">
        <label>Members</label>
        <div class="checkbox-grid">
            {% for user in users %}
            <label class="checkbox-label">
                <input type="checkbox" name="member_ids" value="{{ user.id }}">
                <img src="{{ user.gravatar(20) }}" class="avatar-xs">
                {{ user.display_name }}
            </label>
            {% endfor %}
        </div>
    </div>

    <div class="form-actions">
        <a href="{{ url_for('teams.list_teams') }}" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary">Create Team</button>
    </div>
</form>
{% endblock %}
